# Consilium Local Development Stack
# Run: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: consilium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: consilium
      POSTGRES_USER: consilium
      POSTGRES_PASSWORD: consilium_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consilium"]
      interval: 5s
      timeout: 3s
      retries: 5

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: consilium-presidio-analyzer
    restart: unless-stopped
    ports:
      - "5001:3000"

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: consilium-presidio-anonymizer
    restart: unless-stopped
    ports:
      - "5002:3000"

  cognee:
    image: cognee/cognee:main
    container_name: consilium-cognee
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./cognee.env
    volumes:
      # The image's cwd is /app/cognee, not /app — mounting /app/.data_storage
      # (the old path here) silently misses the real data dirs, so the
      # relational DB (users/API keys) and vector/graph stores reset on every
      # container recreation.
      - cognee_data:/app/cognee/.data_storage
      - cognee_system:/app/cognee/.cognee_system
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  cognee-mcp:
    image: cognee/cognee-mcp:main
    container_name: consilium-cognee-mcp
    restart: unless-stopped
    profiles:
      - mcp
    ports:
      - "8001:8000"
    env_file:
      - ./cognee.env
    environment:
      - TRANSPORT_MODE=sse
    volumes:
      - cognee_mcp_data:/app/.data_storage

volumes:
  pgdata:
  cognee_data:
  cognee_system:
  cognee_mcp_data:
